<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREA 51 | COMMAND CENTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --accent: #d4af37;
            --dark-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: #050505;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        .admin-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Header kinyamwezi */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .status-badge {
            background: rgba(0, 255, 100, 0.1);
            color: #00ff64;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 100, 0.2);
        }

        /* Tactical Form */
        .deploy-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 768px) { .deploy-grid { grid-template-columns: 1fr; } }

        .control-panel {
            background: var(--dark-card);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .control-panel h3 {
            margin-top: 0;
            font-size: 18px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
            opacity: 0.5;
        }

        .input-box input, .input-box select {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .btn-deploy {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-deploy:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        /* Inventory List */
        .inventory-panel {
            background: var(--dark-card);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 25px;
        }

        .product-list-grid {
            display: grid;
            gap: 10px;
        }

        .admin-p-card {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .admin-p-card img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 8px;
        }

        .admin-p-info { flex: 1; }
        .admin-p-info h4 { margin: 0; font-size: 14px; }
        .admin-p-info span { font-size: 12px; color: var(--accent); font-weight: 700; }

        .btn-delete {
            background: rgba(255, 50, 50, 0.1);
            color: #ff3232;
            border: 1px solid rgba(255, 50, 50, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete:hover {
            background: #ff3232;
            color: white;
        }

        .back-btn {
            text-decoration: none;
            color: #eee;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="admin-wrapper">
        <header class="admin-header">
            <div>
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> RETURN TO BASE</a>
                <h1 style="margin: 10px 0 0 0; font-size: 24px;">COMMAND <span style="color: var(--accent);">CENTER</span></h1>
            </div>
            <div class="status-badge"><i class="fas fa-circle" style="font-size: 7px;"></i> Agent Online</div>
        </header>

        <div class="deploy-grid">
            <aside class="control-panel">
                <h3><i class="fas fa-plus-circle"></i> New Entry</h3>
                <div class="input-box">
                    <i class="fas fa-tag"></i>
                    <input type="text" id="pName" placeholder="Gear Name...">
                </div>
                <div class="input-box">
                    <i class="fas fa-coins"></i>
                    <input type="number" id="pPrice" placeholder="Price (Tsh)...">
                </div>
                <div class="input-box">
                    <i class="fas fa-layer-group"></i>
                    <select id="pCategory">
                        <option value="ALL">Select Category</option>
                        <option value="DENIM">Denim & Jeans</option>
                        <option value="JEWELRY">Jewelry</option>
                        <option value="SPRAYS">Fragrances</option>
                    </select>
                </div>
                <div class="input-box">
                    <i class="fas fa-image"></i>
                    <input type="text" id="pImg" placeholder="Image URL (e.g. images/p1.jpg)">
                </div>
                <button class="btn-deploy" onclick="deployProduct()">🚀 Deploy Gear</button>
            </aside>

            <main class="inventory-panel">
                <h3 style="color: var(--accent); letter-spacing: 2px; font-size: 18px; margin-top: 0;"><i class="fas fa-box-open"></i> LIVE INVENTORY</h3>
                <div id="adminProductList" class="product-list-grid">
                    </div>
            </main>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
